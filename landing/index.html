<!-- База рецептов (window.RECIPES). НЕ fetch — работает и под file:// --->
<script src="data/recipes.js?v=20260701l"></script>
<script src="js/assistant.js?v=20260701l"></script>
<script src="js/sync.js?v=20260701l"></script>
<script src="js/app.js?v=20260701l"></script>
<script>
  // Service worker: только по http(s), file:// не трогаем. Один reload при активации новой версии.
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    addEventListener('load', () => {
      // ?v= версионирует URL (CF кэширует .js 4ч → на релиз меняем query, чтобы SW обновился сразу)
      navigator.serviceWorker.register('/sw.js?v=20260701l', { updateViaCache: 'none' }).catch(() => {});
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return; refreshing = true; location.reload();
      });
    });
  }
</script>
</body>
