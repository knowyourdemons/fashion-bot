name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: fashion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d fashion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/fashion
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      TELEGRAM_BOT_TOKEN: fake-token-for-tests
      ANTHROPIC_API_KEY_1: fake-key-for-tests
      ANTHROPIC_API_KEY_2: fake-key-for-tests
      WEBHOOK_SECRET: fake-secret
      REMOVE_BG_API_KEY: fake-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev gcc

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Test summary
        uses: test-summary/action@v2
        with:
          paths: test-results.xml
        if: always()
