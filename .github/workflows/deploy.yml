name: Deploy

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no stas@${{ secrets.SERVER_HOST }} '
            cd ~/fashion-bot &&
            git pull origin main &&
            docker compose -f docker/docker-compose.yml build app worker &&
            docker compose -f docker/docker-compose.yml up -d --no-deps --force-recreate worker &&
            sleep 3 &&
            docker compose -f docker/docker-compose.yml up -d --no-deps --force-recreate app &&
            sleep 10 &&
            curl -sf http://localhost:8000/health && echo "✅ Health OK" || echo "❌ Health FAIL"
          '
        timeout-minutes: 10

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.ADMIN_TELEGRAM_ID }}\",
              \"text\": \"✅ Deploy complete!\nCommit: ${{ github.event.workflow_run.head_commit.message }}\"
            }"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.ADMIN_TELEGRAM_ID }}\",
              \"text\": \"❌ Deploy FAILED!\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
