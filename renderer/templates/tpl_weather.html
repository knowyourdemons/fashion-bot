<!-- TEMPLATE: weather_card (0 фото в образе)
     Jinja2: {{ name }}, {{ context }}, {{ date_str }}, {{ theme }},
             {{ weather }}, {{ layers }}, {{ kassi_comment }}
     Превью: открыть в Chrome, width=440px -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'N';src:url('/usr/share/fonts/custom/Nunito-Regular.ttf');font-weight:400}
@font-face{font-family:'N';src:url('/usr/share/fonts/custom/Nunito-Bold.ttf');font-weight:700}
*{margin:0;padding:0;box-sizing:border-box}
body{width:440px;font-family:'N',sans-serif;padding:16px}
/* mom: #F5EDE8→#F0E8E4  woman: #E8EDF5→#E4E8F0 */
.mom{background:linear-gradient(180deg,#F5EDE8,#F0E8E4);--c:#5B3A4A;--cm:#B09888;--acc:#D080A0;--abg:#F8F0F4;--abg2:#E8F0FF;--abg3:#FFF8E8}
.woman{background:linear-gradient(180deg,#E8EDF5,#E4E8F0);--c:#3A4A5B;--cm:#8898A8;--acc:#7090C0;--abg:#F0F2F8;--abg2:#E8F0FF;--abg3:#FFF8E8}
.hdr-d{font-size:9px;color:var(--cm);letter-spacing:.5px;text-transform:uppercase}
.hdr-n{font-size:20px;font-weight:700;color:var(--c)}
.wx{text-align:center;padding:12px 0;background:#fff;border-radius:14px;margin:10px 0}
.wx-icon{font-size:48px}
.wx-row{display:flex;justify-content:center;gap:16px;margin-top:8px}
.wx-item{text-align:center}
.wx-temp{font-size:18px;font-weight:700;color:var(--c)}
.wx-temp.warn{color:#C05050}
.wx-lbl{font-size:8px;color:var(--cm)}
.layers{background:#fff;border-radius:14px;padding:10px 12px;margin-bottom:8px}
.layers-h{font-size:8px;color:var(--cm);letter-spacing:.5px;margin-bottom:6px}
.layers-grid{display:flex;flex-wrap:wrap;gap:4px}
.layer{border-radius:8px;padding:6px 4px;text-align:center;flex:1;min-width:56px}
.layer .icon{font-size:20px}
.layer .name{font-size:8px;color:var(--c);margin-top:2px}
.layer-base{background:var(--abg)}
.layer-accent{background:var(--abg2);border:1px solid #D0E0F0}
.layer-accent .name{color:#4A6A8A;font-weight:700}
.layer-warn{background:var(--abg3);border:1px solid #F0E0B0}
.layer-warn .name{color:#A08020;font-weight:700}
.kassi{background:rgba(255,255,255,.5);border-radius:10px;padding:8px 10px;margin-top:8px}
.kassi-t{font-size:10px;color:var(--c);line-height:1.4}
.kassi-a{font-size:8px;color:var(--cm);margin-top:3px}
.cta{background:#fff;border-radius:10px;padding:8px;text-align:center;margin-top:8px}
.cta-t{font-size:10px;font-weight:700;color:var(--c)}
.cta-s{font-size:8px;color:var(--cm);margin-top:2px}
</style>
</head>
<body class="mom">

<div style="text-align:center;margin-bottom:6px">
  <div class="hdr-d">ПТ, 21 МАРТА · САДИК</div>
  <div class="hdr-n">Алиса</div>
</div>

<div class="wx">
  <div class="wx-icon">☀️</div>
  <div class="wx-row">
    <div class="wx-item"><div class="wx-temp">+4°</div><div class="wx-lbl">утро</div></div>
    <div class="wx-item"><div class="wx-temp">+7°</div><div class="wx-lbl">день</div></div>
    <div class="wx-item"><div class="wx-temp warn">+2°</div><div class="wx-lbl">вечер 🌧️</div></div>
  </div>
</div>

<div class="layers">
  <div class="layers-h">ОДЕВАЕМ</div>
  <div class="layers-grid">
    <div class="layer layer-base"><div class="icon">🩲</div><div class="name">базовый</div></div>
    <div class="layer layer-base"><div class="icon">👚</div><div class="name">кофта</div></div>
    <div class="layer layer-base"><div class="icon">👖</div><div class="name">штаны</div></div>
    <div class="layer layer-accent"><div class="icon">🧥</div><div class="name">куртка!</div></div>
  </div>
  <div class="layers-grid" style="margin-top:4px">
    <div class="layer layer-base"><div class="icon">👟</div><div class="name">обувь</div></div>
    <div class="layer layer-base"><div class="icon">🧢</div><div class="name">шапка</div></div>
    <div class="layer layer-warn"><div class="icon">🌂</div><div class="name">зонт!</div></div>
  </div>
</div>

<div class="kassi">
  <div class="kassi-t">🌧️ К вечеру дождь +2° — зонт на забирание!</div>
  <div class="kassi-a">— Касси</div>
</div>

<div class="cta">
  <div class="cta-t">📸 Сфоткай вещи — соберу образ!</div>
  <div class="cta-s">По одной, на светлом фоне</div>
</div>

</body>
</html>
