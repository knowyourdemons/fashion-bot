{# TEMPLATE: style quiz result card
   Vars: name, style_label, style_desc, palette (list of hex), tone_words
   Размер: 440×520px #}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'N';src:url('/usr/share/fonts/custom/Nunito-Regular.ttf');font-weight:400}
@font-face{font-family:'N';src:url('/usr/share/fonts/custom/Nunito-Bold.ttf');font-weight:700}
*{margin:0;padding:0;box-sizing:border-box}
body{width:440px;height:520px;font-family:'N',sans-serif;
  background:linear-gradient(160deg, {{ palette[0] }}20, {{ palette[1] }}30, {{ palette[2] }}20);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 30px}
.badge{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.name{font-size:14px;color:#666;margin-bottom:4px}
.title{font-size:28px;font-weight:700;color:{{ palette[0] }};text-align:center;margin-bottom:20px;line-height:1.3}
.dots{display:flex;gap:10px;margin-bottom:24px}
.dot{width:28px;height:28px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.desc{font-size:14px;color:#555;text-align:center;line-height:1.6;margin-bottom:8px;max-width:340px}
.words{font-size:11px;color:#999;text-align:center;font-style:italic;margin-bottom:30px}
.watermark{font-size:9px;color:#bbb;letter-spacing:1px}
</style>
</head>
<body>

<div class="badge">STYLE TYPE</div>
<div class="name">{{ name }}</div>
<div class="title">{{ style_label }}</div>

<div class="dots">
{% for hex in palette %}
  <div class="dot" style="background:{{ hex }}"></div>
{% endfor %}
</div>

<div class="desc">{{ style_desc }}</div>
<div class="words">{{ tone_words }}</div>

<div class="watermark">fashioncastle.app</div>

</body>
</html>
